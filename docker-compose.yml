services:
  claude-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-agent:latest
    container_name: claude-agent
    ports:
      - "7681:7681"
    volumes:
      - claude-agent-config:/root
      - claude-agent-data:/workspace
    environment:
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - LANG=C.UTF-8
    # Keep stdin open for TTY
    stdin_open: true
    tty: true
    # Restart unless manually stopped
    restart: unless-stopped

volumes:
  claude-agent-config:
    name: claude-agent-config
  claude-agent-data:
    name: claude-agent-data
